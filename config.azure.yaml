whatsapp_accounts: []

storage:
  attachments_dir: /tmp/attachments
  checkpoints_dir: /tmp/checkpoints
  logs_dir: /tmp/logs

polling:
  interval_seconds: 60

monitor:
  check_interval_seconds: 30
  restart_after_silence_seconds: 300

kv:
  host: 192.168.100.231
  port: 5322
  dbnum: 2
  timeout: 5

worker:
  whatsapp_connector: servicebus

connectors:
  servicebus:
    type: servicebus
    connection_string: "Endpoint=sb://whatsapp-worker-s.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=fqHAxbBYVqtbiQdYKgc85zEyh7/ohunNH+ASbGbqtMY="
    queue: whatsapp_data
    fallback_path: /tmp/servicebus_fallback.json

  kv:
    type: kv
    host: 192.168.100.231
    port: 5322
    dbnum: 2
    timeout: 5
    fallback_path: /tmp/kv_fallback.json

logger:
  level: debug
  service: whatsapp-fetcher
  handlers:
    - type: console